<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're offline — Open Redis Web UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --text-primary: #212121;
      --text-secondary: #757575;
      --icon: #9e9e9e;
    }

    body.dark {
      --bg: #263238;
      --surface: #37474f;
      --border: #455a64;
      --text-primary: #eceff1;
      --text-secondary: #b0bec5;
      --icon: #78909c;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }

    .icon {
      color: var(--icon);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    button {
      margin-top: 28px;
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
    }

    button:hover { opacity: 0.75; }
  </style>
  <script>
    (function () {
      var theme = localStorage.theme;
      var isDark = theme === 'dark' ||
        (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) document.documentElement.classList.add('dark-init');
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">
      <!-- wifi-off icon (Material Icons style) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.99 9C19.15 5.16 13.8 3.76 8.84 4.78L11 6.94c3.13-.41 6.37.44 8.98 2.58zm-4 4c-1.29-1.29-2.97-2.07-4.82-2.31L9.13 5.65C6.37 6.24 3.8 7.65 1.79 9.66L3.2 11.07C4.93 9.34 7.09 8.17 9.43 7.68L12 10.25c1.36.35 2.58 1.02 3.59 1.94zm-3.47 3.47L12 13.34 6.41 7.75C4.36 8.98 2.59 10.73 1.27 12.87L2.7 14.3c1.24-1.96 2.9-3.56 4.83-4.63L12 14.1v-.04l3.52 3.51zm-3.06 3.07L12 20l-1.46-1.46-.06.06z"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>The app server is unreachable. Check your network connection or wait for the server to come back up.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
  <script>
    (function () {
      var theme = localStorage.theme;
      var isDark = theme === 'dark' ||
        (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) document.body.classList.add('dark');
    })();

    // Poll /api/health — redirect back to app when server recovers
    (function () {
      var timer = setInterval(function () {
        fetch('/api/health', { cache: 'no-store' })
          .then(function (res) {
            if (res.ok) {
              clearInterval(timer);
              window.location.href = '/';
            }
          })
          .catch(function () { /* still offline, keep polling */ });
      }, 5000);
    })();
  </script>
</body>
</html>
